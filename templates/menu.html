<!DOCTYPE html>
<html>
<head>
    <title>Menu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Our Menu</h1>

<div class="menu-container">

{% for food in foods %}
<div class="card">

<img src="{{ url_for('static', filename=food[3]) }}" width="200">
    <h2>{{ food[1] }}</h2>

    <p>₹ {{ food[2] }}</p>

    <a href="/order/{{ food[0] }}">
        <button>Order Now</button>
    </a>

</div>
{% endfor %}

</div>

</body>
</html>
