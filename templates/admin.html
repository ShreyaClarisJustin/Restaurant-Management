<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Admin Dashboard</h1>

<table border="1" cellpadding="10">

<tr>
    <th>Order ID</th>
    <th>Customer</th>
    <th>Food</th>
    <th>Quantity</th>
    <th>Total</th>
</tr>

{% for order in orders %}
<tr>
    <td>{{ order[0] }}</td>
    <td>{{ order[1] }}</td>
    <td>{{ order[2] }}</td>
    <td>{{ order[3] }}</td>
    <td>{{ order[4] }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
