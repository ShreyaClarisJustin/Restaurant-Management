<!DOCTYPE html>
<html>
<head>
    <title>Place Order</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Place Your Order</h1>

<h2>{{ food[1] }}</h2>
<p>Price: ₹{{ food[2] }}</p>

<form action="/place_order" method="POST">

    <input type="hidden"
           name="food_id"
           value="{{ food[0] }}">

    <label>Your Name</label>
    <br>
    <input type="text"
           name="customer_name"
           required>

    <br><br>

    <label>Quantity</label>
    <br>
    <input type="number"
           name="quantity"
           min="1"
           value="1">

    <br><br>

    <button type="submit">
        Continue
    </button>

</form>

</body>
</html>
